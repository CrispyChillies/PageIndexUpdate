services:
  postgres:
    image: postgres:16
    container_name: pageindex-postgres
    environment:
      POSTGRES_DB: pageindex
      POSTGRES_USER: pageindex
      POSTGRES_PASSWORD: pageindex
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    image: python:3.11-slim
    container_name: pageindex-api
    working_dir: /app
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      DATABASE_URL: postgresql+psycopg://pageindex:pageindex@postgres:5432/pageindex
      CHATGPT_API_KEY: ${CHATGPT_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      PAGEINDEX_DEBUG: ${PAGEINDEX_DEBUG:-0}
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - postgres

volumes:
  postgres_data:
